<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financial AI Briefing Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            finance: { light: '#e0e7ff', DEFAULT: '#1e3a8a', dark: '#172554', accent: '#3b82f6' }
          }
        }
      }
    }
  </script>
  <!-- React and Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const mockQuizData = {
      question: "기존 디지털 세계(챗봇 등)에서만 작동하는 AI와 달리, 로봇 등 물리적 형태를 가지고 현실 세계의 사물과 직접 상호작용하는 인공지능을 무엇이라 부를까요?",
      options: [
        "초개인화 AI (Hyper-personalization AI)",
        "피지컬 AI (Physical AI)",
        "오픈소스 AI (Open-source AI)",
        "클라우드 AI (Cloud AI)"
      ],
      correctAnswerIndex: 1,
      explanation: "정답입니다! '피지컬 AI'는 향후 무인 은행 점포나 지능형 로봇 텔러 등 실제 금융 오프라인 현장에 큰 변화를 가져올 핵심 기술입니다."
    };

    const mockNewsData = [
      {
        id: "news-1",
        title: "빅테크 간 차세대 AI 및 클라우드 인프라 동맹 구축",
        summary: "글로벌 빅테크 기업들이 차세대 AI 인프라 발전과 클라우드 컴퓨팅 최적화를 위해 다년간의 전략적 협력을 발표했습니다. 이는 점차 거대해지는 오픈소스 AI 모델과 엔터프라이즈 환경에서의 AI 도입을 가속화하기 위한 하드웨어-소프트웨어 통합 생태계 구축의 일환으로 풀이됩니다.",
        url: "#",
        terms: [
          { keyword: "오픈소스 AI 모델", explanation: "기업들이 무료로 소스코드를 공개하여 누구나 수정할 수 있는 AI 기반입니다." },
          { keyword: "엔터프라이즈 환경", explanation: "개인이 아닌 기업이나 기관에서 대규모 업무 처리를 위해 사용하는 IT 생태계를 의미합니다." }
        ],
        financeIdea: { title: "프라이빗 클라우드 기반 은행 자체 특화 AI 플랫폼 구축", reason: "망분리와 규제로 인해 퍼블릭 클라우드 활용이 제한적인 금융권은, 향후 프라이빗 클라우드에서도 가볍게 동작하는 sLLM 기반 고객 상담 시스템을 선도적으로 구축할 필요가 있습니다." }
      },
      {
        id: "news-2",
        title: "산업 현장에 스며드는 '피지컬 AI'와 로보틱스의 융합",
        summary: "AI가 단순히 가상의 공간에서 글이나 그림을 생성하는 것을 넘어, 로봇에 탑재되어 물리적인 세상을 인지하고 스스로 행동하는 '피지컬 AI(Physical AI)'가 핵심 생존 전략으로 부상하고 있습니다.",
        url: "#",
        terms: [
          { keyword: "피지컬 AI", explanation: "디지털 공간을 넘어, 로봇/차량 등 물리적 형태를 가지고 현실 세계와 작용하는 인공지능" }
        ],
        financeIdea: { title: "스마트 무인 점포 내 1:1 맞춤형 AI 로봇 텔러 도입", reason: "휴머노이드 로봇을 바탕으로 고령 고객의 표정과 몸짓을 인지해, 선제적으로 다가가 음성 안내를 하는 '지능형 로봇 은행원' 서비스 기획이 가능해집니다." }
      }
    ];

    const TermNote = ({ terms }) => (
      <div className="bg-slate-50 rounded-xl p-5 border-l-4 border-l-finance-accent shadow-sm mt-6 lg:mt-0">
        <h3 className="font-bold text-finance-dark mb-3">📖 기획자를 위한 쉬운 용어 노트</h3>
        <div className="space-y-3">
          {terms.map((term, idx) => (
            <div key={idx} className="text-[0.95rem] text-slate-700">
              <span className="font-semibold text-finance-dark bg-yellow-100 px-1.5 py-0.5 rounded mr-2">
                {term.keyword}
              </span>
              <span className="leading-relaxed block mt-1 sm:inline sm:mt-0">{term.explanation}</span>
            </div>
          ))}
        </div>
      </div>
    );

    const FinanceIdea = ({ idea }) => (
      <div className="bg-finance-light/30 rounded-xl p-5 border border-finance-light mt-4">
        <h3 className="font-bold text-finance sm:text-lg mb-3">💡 금융 비즈니스 아이디어 뱅크</h3>
        <div className="bg-white rounded-lg p-4 shadow-sm">
          <h4 className="font-semibold text-finance-dark text-[1.05rem] mb-2">{idea.title}</h4>
          <p className="text-slate-700 text-[0.95rem] leading-relaxed">{idea.reason}</p>
        </div>
      </div>
    );

    const NewsCard = ({ news }) => (
      <article className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden h-full">
        <div className="p-6 md:p-8">
          <span className="text-sm font-medium text-finance-accent mb-4 block animate-pulse">🔥 최신 트렌드</span>
          <h2 className="text-xl md:text-2xl font-bold text-finance-dark mb-4 leading-tight">{news.title}</h2>
          <p className="text-slate-600 mb-6 leading-relaxed text-[1.05rem]">{news.summary}</p>
          <a href={news.url} className="inline-flex items-center text-sm font-semibold text-finance hover:text-finance-dark underline underline-offset-4">
            기사 원문 보기 ↗
          </a>
        </div>
      </article>
    );

    const DailyQuiz = ({ quizData }) => {
      const [selectedIdx, setSelectedIdx] = useState(null);
      const [isSubmitted, setIsSubmitted] = useState(false);
      const isCorrect = selectedIdx === quizData.correctAnswerIndex;

      return (
        <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8 mt-12 mb-16">
          <h2 className="text-2xl font-bold text-finance-dark mb-6">🧠 데일리 AI 퀴즈</h2>
          <div className="mb-6 bg-slate-50 p-6 rounded-xl border border-slate-100">
            <p className="text-lg font-medium text-slate-800 leading-relaxed">Q. {quizData.question}</p>
          </div>
          <div className="grid gap-3 mb-8">
            {quizData.options.map((option, idx) => (
              <button
                key={idx} disabled={isSubmitted} onClick={() => setSelectedIdx(idx)}
                className={`w-full text-left p-4 rounded-xl border-2 transition-all duration-200 text-[1.05rem] ${
                  isSubmitted 
                    ? idx === quizData.correctAnswerIndex ? 'border-green-500 bg-green-50 text-green-900' : idx === selectedIdx ? 'border-red-300 bg-red-50 text-red-900 opacity-70' : 'border-slate-200 bg-white opacity-50'
                    : selectedIdx === idx ? 'border-finance bg-finance-light/20 text-finance-dark font-medium shadow-sm' : 'border-slate-200 hover:border-finance-light hover:bg-slate-50 text-slate-700'
                }`}
              >
                <span className="inline-block w-6 font-semibold opacity-70 mr-2">{idx + 1}.</span>{option}
              </button>
            ))}
          </div>
          {!isSubmitted ? (
            <button
              onClick={() => { if(selectedIdx !== null) setIsSubmitted(true); }}
              disabled={selectedIdx === null}
              className={`w-full py-4 rounded-xl font-bold text-lg transition-colors ${selectedIdx !== null ? 'bg-finance text-white hover:bg-finance-dark shadow-md' : 'bg-slate-100 text-slate-400 cursor-not-allowed'}`}
            >
              정답 확인하기
            </button>
          ) : (
            <div className={`p-5 rounded-xl border ${isCorrect ? 'bg-green-50 text-green-900 border-green-200' : 'bg-red-50 text-red-900 border-red-200'}`}>
              <h4 className="font-bold text-lg mb-2">{isCorrect ? '✅ 정답입니다!' : '❌ 아쉽습니다, 오답입니다.'}</h4>
              <p className="leading-relaxed">{quizData.explanation}</p>
            </div>
          )}
        </section>
      );
    };

    const App = () => {
      const today = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
      return (
        <main className="min-h-screen bg-slate-50">
          <header className="bg-finance text-white pb-16 pt-12 px-6 shadow-md">
            <div className="max-w-4xl mx-auto">
              <span className="inline-block bg-finance-light/20 px-4 py-2 rounded-full text-sm font-medium mb-6">🗓 {today} 발행</span>
              <h1 className="text-4xl md:text-5xl font-extrabold tracking-tight mb-4 text-transparent bg-clip-text bg-gradient-to-r from-white to-finance-light">Financial AI Briefing</h1>
              <p className="text-finance-light text-lg md:text-xl font-medium tracking-wide">금융권 기획자를 위한 하루 5분 AI 과외</p>
            </div>
          </header>
          <div className="max-w-5xl mx-auto px-4 sm:px-6 -mt-8">
            <div className="space-y-10">
              {mockNewsData.map((news) => (
                <div key={news.id} className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                  <div className="lg:col-span-7 h-full">
                    <NewsCard news={news} />
                  </div>
                  <div className="lg:col-span-5 flex flex-col">
                    <TermNote terms={news.terms} />
                    <FinanceIdea idea={news.financeIdea} />
                  </div>
                </div>
              ))}
            </div>
            <DailyQuiz quizData={mockQuizData} />
          </div>
        </main>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
